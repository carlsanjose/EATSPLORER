# Eatsplorer RASA Configuration
# Pipeline uses SpaCy en_core_web_lg + DIETClassifier

recipe: default.v1

language: en

pipeline:
- name: SpacyNLP
  model: en_core_web_lg
  case_sensitive: false
- name: SpacyTokenizer
- name: SpacyFeaturizer
  pooling: mean
- name: RegexEntityExtractor
  use_lookup_tables: true
- name: RegexFeaturizer
- name: LexicalSyntacticFeaturizer
- name: CountVectorsFeaturizer
  analyzer: word
- name: CountVectorsFeaturizer
  analyzer: char_wb
  min_ngram: 1
  max_ngram: 4
- name: DIETClassifier
  epochs: 80                  # Reduced from 100 to prevent late-stage memorization
  drop_rate: 0.25             # Randomly drops 25% of network nodes to force generalization
  weight_sparsity: 0.8        # Keeps the network lightweight
  constrain_similarities: true
  entity_recognition: true
  use_masked_language_model: true
- name: EntitySynonymMapper
- name: ResponseSelector
  epochs: 100
  constrain_similarities: true
- name: FallbackClassifier
  threshold: 0.3
  ambiguity_threshold: 0.1

policies:
- name: MemoizationPolicy
- name: TEDPolicy
  max_history: 5
  epochs: 100
  constrain_similarities: true
- name: RulePolicy
  core_fallback_threshold: 0.3
  core_fallback_action_name: "action_default_fallback"
  enable_fallback_prediction: true
assistant_id: 20260402-105951-glad-scuba

